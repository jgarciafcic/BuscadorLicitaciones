server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
  tomcat:
    max-threads: 10

spring:
  main:
    lazy-initialization: true
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false

placsp:
  llm:
    provider: claude
    claude-api-key: ${ANTHROPIC_API_KEY:}
    claude-model: claude-sonnet-4-20250514
